<div class="cadastro-container">

  <div class="page-header">

    <h1>Cadastrar Funcionário</h1>

    <p>
      Registre novos colaboradores da construtora
    </p>

  </div>

  <div class="form-card">

    <form
  #formFuncionario="ngForm"
  (ngSubmit)="salvar()">

      <div class="form-grid">

        <div class="form-group">
          <label>Nome Completo</label>
          <input
            type="text"
            [(ngModel)]="funcionario.nome"
            name="nome"
            placeholder="Digite o nome completo"
          >
        </div>

        <div class="form-group">
          <label>CPF</label>
          <input
            type="text"
            [(ngModel)]="funcionario.cpf"
            name="cpf"
            placeholder="000.000.000-00"
          >
        </div>

        <div class="form-group">
          <label>Cargo</label>
          <input
            type="text"
            [(ngModel)]="funcionario.cargo"
            name="cargo"
            placeholder="Ex: Engenheiro Civil"
          >
        </div>

        <div class="form-group">
          <label>Salário</label>
          <input
            type="number"
            [(ngModel)]="funcionario.salario"
            name="salario"
            placeholder="0,00"
          >
        </div>

        <div class="form-group">
          <label>Telefone</label>
          <input
            type="text"
            [(ngModel)]="funcionario.telefone"
            name="telefone"
            placeholder="(71) 99999-9999"
          >
        </div>

        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            [(ngModel)]="funcionario.email"
            name="email"
            placeholder="email@empresa.com"
          >
        </div>

        <div class="form-group full-width">
          <label>Status</label>

          <select
            [(ngModel)]="funcionario.status"
            name="status"
          >
            <option value="">
              Selecione
            </option>

            <option value="Ativo">
              Ativo
            </option>

            <option value="Inativo">
              Inativo
            </option>

            <option value="Férias">
              Férias
            </option>
          </select>
        </div>

      </div>

      <div class="actions">

        <button
          type="button"
          class="btn-cancelar"
        >
          Cancelar
        </button>

        <button
          type="submit"
          class="btn-salvar"
        >
          Salvar Funcionário
        </button>

      </div>

    </form>

  </div>

</div>
