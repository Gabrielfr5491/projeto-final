<div class="container">

  <div class="card-header">

    <h1>Funcionários</h1>

    <button
      class="btn-add"
      *ngIf="auth.podeEditar()"
      routerLink="/cadastro-funcionario"
    >
      + Novo Funcionário
    </button>

  </div>

  <div class="table-responsive">
  <table class="table">

    <thead>
      <tr>
        <th>Nome</th>
        <th>Cargo</th>
        <th>Email</th>
        <th>Telefone</th>
        <th>Status</th>
        <th>Salário</th>
        <th>Ações</th>
      </tr>
    </thead>

    <tbody>

      <tr *ngFor="let funcionario of funcionarios">

        <td>{{ funcionario.nome }}</td>

        <td>{{ funcionario.cargo }}</td>

        <td>{{ funcionario.email }}</td>

        <td>{{ funcionario.telefone }}</td>

        <td>

          <span
            class="status"
            [ngClass]="{
              'ativo': funcionario.status === 'Ativo',
              'inativo': funcionario.status === 'Inativo',
              'ferias': funcionario.status === 'Férias'
            }"
          >
            {{ funcionario.status }}
          </span>

        </td>

        <td>

          {{
            funcionario.salario
            | currency:'BRL':'symbol':'1.2-2':'pt-BR'
          }}

        </td>

        <td>
          <div class="actions-cell">
            <button
              *ngIf="auth.podeEditar()"
              class="btn-action btn-action--edit"
              title="Editar Funcionário"
              [routerLink]="['/editar-funcionario', funcionario.id]">
              <i class="bi bi-pencil"></i>
            </button>
            <button
              *ngIf="auth.podeEditar()"
              class="btn-action btn-action--delete"
              title="Excluir Funcionário"
              (click)="excluir(funcionario.id)">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </td>

      </tr>

    </tbody>

  </table>
  </div>

</div>
