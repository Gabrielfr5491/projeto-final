<div class="container">

  <div class="card-header">
    <div>
      <h1>Novo Custo</h1>
      <p class="header-sub">Preencha os dados do lançamento</p>
    </div>
    <a routerLink="/custos" class="btn-editar">
      <i class="bi bi-arrow-left"></i> Voltar
    </a>
  </div>

  <div class="card">
    <form (ngSubmit)="salvar()" #form="ngForm">

      <div class="section-title">
        <i class="bi bi-info-circle"></i> Informações do Lançamento
      </div>

      <div class="grid">

        <div class="form-group span-2">
          <label>Descrição <span class="obrigatorio">*</span></label>
          <input
            type="text"
            [(ngModel)]="custo.descricao"
            name="descricao"
            placeholder="Ex: Compra de cimento, Pagamento pedreiro..."
            required
          />
        </div>

        <div class="form-group">
          <label>Categoria <span class="obrigatorio">*</span></label>
          <select [(ngModel)]="custo.categoria" name="categoria" required>
            <option value="">Selecione uma categoria</option>
            <option value="Material">Material</option>
            <option value="Funcionário">Funcionário</option>
            <option value="Equipamento">Equipamento</option>
            <option value="Receita">Receita</option>
            <option value="Outros">Outros</option>
          </select>
        </div>

        <div class="form-group">
          <label>Tipo <span class="obrigatorio">*</span></label>
          <div class="tipo-toggle">
            <button
              type="button"
              class="tipo-btn"
              [class.tipo-btn--entrada]="custo.tipo === 'Entrada'"
              (click)="custo.tipo = 'Entrada'"
            >
              <i class="bi bi-arrow-down-circle"></i> Entrada
            </button>
            <button
              type="button"
              class="tipo-btn"
              [class.tipo-btn--saida]="custo.tipo === 'Saida'"
              (click)="custo.tipo = 'Saida'"
            >
              <i class="bi bi-arrow-up-circle"></i> Saída
            </button>
          </div>
        </div>

        <div class="form-group">
          <label>Valor (R$) <span class="obrigatorio">*</span></label>
          <div class="input-prefix">
            <span class="prefix">R$</span>
            <input
              type="number"
              [(ngModel)]="custo.valor"
              name="valor"
              placeholder="0,00"
              min="0"
              step="0.01"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label>Data <span class="obrigatorio">*</span></label>
          <input
            type="date"
            [(ngModel)]="custo.data"
            name="data"
            required
          />
        </div>

        <div class="form-group span-2">
          <label>Obra <span class="obrigatorio">*</span></label>
          <select [(ngModel)]="custo.obraId" name="obraId" required>
            <option [ngValue]="0">Selecione a obra vinculada</option>
            <option *ngFor="let obra of obras" [ngValue]="obra.id">
              {{ obra.nome }} — {{ obra.cidade }}
            </option>
          </select>
        </div>

      </div>

      <div class="form-actions">
        <a routerLink="/custos" class="btn-editar">Cancelar</a>
        <button
          type="submit"
          class="btn-salvar"
          [disabled]="!custo.descricao || !custo.categoria || !custo.tipo || !custo.valor || !custo.data || !custo.obraId"
        >
          <i class="bi bi-check2"></i> Salvar Custo
        </button>
      </div>

    </form>
  </div>

</div>
