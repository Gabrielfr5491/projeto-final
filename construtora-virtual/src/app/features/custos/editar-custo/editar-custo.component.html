<div class="container">
  <h2>Editar Custo</h2>

  <form (ngSubmit)="atualizar()" #formCusto="ngForm" class="form-grid">
    
    <div class="form-group">
      <label for="descricao">Descrição</label>
      <input type="text" id="descricao" [(ngModel)]="custo.descricao" name="descricao" required placeholder="Ex: Material de construção">
    </div>

    <div class="form-group">
      <label for="valor">Valor</label>
      <input type="number" id="valor" [(ngModel)]="custo.valor" name="valor" required placeholder="0.00">
    </div>

    <div class="form-group">
      <label for="data">Data</label>
      <input type="date" id="data" [(ngModel)]="custo.data" name="data" required>
    </div>

    <div class="form-group">
      <label for="categoria">Categoria</label>
      <input type="text" id="categoria" [(ngModel)]="custo.categoria" name="categoria" placeholder="Ex: Alvenaria">
    </div>

    <div class="form-group">
      <label for="obra">Obra</label>
      <input type="text" id="obra" [(ngModel)]="custo.obra" name="obra" placeholder="Nome da obra">
    </div>

    <div class="form-group">
      <label for="tipo">Tipo</label>
      <select id="tipo" [(ngModel)]="custo.tipo" name="tipo">
        <option value="">Selecione...</option>
        <option value="fixo">Fixo</option>
        <option value="variavel">Variável</option>
      </select>
    </div>

    <div class="actions">
      <button type="button" class="btn btn-cancel" routerLink="/custos">Cancelar</button>
      <button type="submit" class="btn btn-primary" [disabled]="!formCusto.form.valid">Salvar Alterações</button>
    </div>
  </form>
</div>
