<div class="container">

  <div class="card">

    <h1>Editar Custo</h1>

    <form (ngSubmit)="atualizar()">

      <div class="grid">

        <div class="form-group">

          <label>Descrição</label>

          <input
            type="text"
            [(ngModel)]="custo.descricao"
            name="descricao"
            required>

        </div>

        <div class="form-group">

          <label>Categoria</label>

          <select
            [(ngModel)]="custo.categoria"
            name="categoria"
            required>

            <option value="Material">
              Material
            </option>

            <option value="Funcionário">
              Funcionário
            </option>

            <option value="Equipamento">
              Equipamento
            </option>

            <option value="Receita">
              Receita
            </option>

            <option value="Outros">
              Outros
            </option>

          </select>

        </div>

        <div class="form-group">

          <label>Valor</label>

          <input
            type="number"
            [(ngModel)]="custo.valor"
            name="valor"
            required>

        </div>

        <div class="form-group">

          <label>Data</label>

          <input
            type="date"
            [(ngModel)]="custo.data"
            name="data"
            required>

        </div>

        <div class="form-group">

          <label>Obra</label>

          <select
            [(ngModel)]="custo.obraId"
            name="obraId"
            required>

            <option [ngValue]="0">
              Selecione uma obra
            </option>

            <option
              *ngFor="let obra of obras"
              [ngValue]="obra.id">

              {{ obra.nome }}

            </option>

          </select>

        </div>

        <div class="form-group">

          <label>Tipo</label>

          <select
            [(ngModel)]="custo.tipo"
            name="tipo"
            required>

            <option value="Entrada">
              Entrada
            </option>

            <option value="Saida">
              Saída
            </option>

          </select>

        </div>

      </div>

      <button
        type="submit"
        class="btn-salvar">

        Atualizar Custo

      </button>

    </form>

  </div>

</div>
