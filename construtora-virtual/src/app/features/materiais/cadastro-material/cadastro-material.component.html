<div class="cadastro-container">

  <div class="page-header">
    <h1>Cadastrar Material</h1>


<p>
  Gerencie o estoque e os insumos utilizados nas obras da construtora.
</p>


  </div>

  <div class="form-card">


<form
  #formMaterial="ngForm"
  (ngSubmit)="salvar()"
>

  <div class="form-grid">

    <div class="form-group">
      <label>Nome do Material</label>

      <input
        type="text"
        [(ngModel)]="material.nome"
        name="nome"
        placeholder="Ex: Cimento CP-II"
        required
      >
    </div>

    <div class="form-group">
      <label>Categoria</label>

      <input
        type="text"
        [(ngModel)]="material.categoria"
        name="categoria"
        placeholder="Ex: Construção Civil"
        required
      >
    </div>

    <div class="form-group">
      <label>Fornecedor</label>

      <input
        type="text"
        [(ngModel)]="material.fornecedor"
        name="fornecedor"
        placeholder="Nome do fornecedor"
        required
      >
    </div>

    <div class="form-group">
      <label>Unidade</label>

      <select
        [(ngModel)]="material.unidade"
        name="unidade"
        required
      >
        <option value="">Selecione</option>
        <option value="Unidade">Unidade</option>
        <option value="Kg">Kg</option>
        <option value="Tonelada">Tonelada</option>
        <option value="Litro">Litro</option>
        <option value="Metro">Metro</option>
        <option value="Metro²">Metro²</option>
        <option value="Metro³">Metro³</option>
      </select>
    </div>

    <div class="form-group">
      <label>Quantidade em Estoque</label>

      <input
        type="number"
        [(ngModel)]="material.quantidade"
        name="quantidade"
        placeholder="0"
        required
      >
    </div>

    <div class="form-group">
      <label>Estoque Mínimo</label>

      <input
        type="number"
        [(ngModel)]="material.estoqueMinimo"
        name="estoqueMinimo"
        placeholder="0"
        required
      >
    </div>

    <div class="form-group full-width">
      <label>Valor Unitário (R$)</label>

      <input
        type="number"
        step="0.01"
        [(ngModel)]="material.valorUnitario"
        name="valorUnitario"
        placeholder="0,00"
        required
      >
    </div>

  </div>

  <div class="actions">

    <button
      type="button"
      class="btn-cancelar"
      (click)="cancelar()"
    >
      Cancelar
    </button>

    <button
      type="submit"
      class="btn-salvar"
    >
      Salvar Material
    </button>

  </div>

</form>


  </div>

</div>
