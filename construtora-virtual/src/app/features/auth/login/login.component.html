<div class="login-container">

  <div class="login-card">

    <h2>Construtora Virtual</h2>

    <input
      class="form-control mb-3"
      placeholder="Email"
      [(ngModel)]="email">

    <input
      type="password"
      class="form-control mb-3"
      placeholder="Senha"
      [(ngModel)]="senha">

    <button
      class="btn btn-primary w-100"
      (click)="entrar()">

      Entrar

    </button>

  </div>

</div>
