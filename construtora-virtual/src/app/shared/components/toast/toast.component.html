<div class="toast-container" aria-live="polite">
  @for (toast of toastService.toasts(); track trackById($index, toast)) {
    <div
      class="toast toast--{{ toast.tipo }}"
      (click)="toastService.remover(toast.id)"
      role="alert">
      <div class="toast__icon">
        @if (toast.tipo === 'sucesso') {
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path d="M20 6L9 17l-5-5"/>
          </svg>
        }
        @if (toast.tipo === 'erro') {
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
        }
        @if (toast.tipo === 'aviso') {
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        }
        @if (toast.tipo === 'info') {
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        }
      </div>
      <span class="toast__msg">{{ toast.mensagem }}</span>
      <button class="toast__close" (click)="toastService.remover(toast.id)" aria-label="Fechar">✕</button>
    </div>
  }
</div>
