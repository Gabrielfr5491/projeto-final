<nav class="navbar-custom" aria-label="Navegação superior">
  
  <button type="button" class="navbar-custom__hamburger" (click)="layout.toggleMobileSidebar()" aria-label="Menu Lateral">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </button>
  
  <div class="navbar-custom__welcome">
    <span class="navbar-custom__greeting">Painel de Controle</span>
    <span class="navbar-custom__date">Gestão Integrada</span>
  </div>

  <div class="navbar-custom__right">
    
    <div class="navbar-custom__actions">
     <button 
      type="button"
      class="navbar-custom__btn-action" 
      (click)="theme.toggleTheme()"
      [title]="theme.currentTheme === 'dark' ? 'Ativar modo claro' : 'Ativar modo escuro'">
  
      <svg *ngIf="theme.currentTheme === 'dark'" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
      </svg>

      <svg *ngIf="theme.currentTheme === 'light'" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
      </svg>

    </button>

    <!-- Botão de alertas com badge -->
    <a routerLink="/alertas"
       class="navbar-custom__btn-action navbar-custom__btn-alertas"
       title="Alertas e notificações">
      <span class="navbar-custom__alertas-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span *ngIf="totalAlertas > 0"
              class="navbar-custom__alertas-badge"
              [class.navbar-custom__alertas-badge--danger]="classBadge === 'badge--danger'"
              [class.navbar-custom__alertas-badge--warning]="classBadge === 'badge--warning'">
          {{ totalAlertas > 9 ? '9+' : totalAlertas }}
        </span>
      </span>
    </a>

    </div>

    <div class="navbar-custom__divider"></div>

    <div class="navbar-custom__profile">
      <div class="navbar-custom__avatar">
        {{ auth.getUsuario().nome ? auth.getUsuario().nome.charAt(0).toUpperCase() : 'A' }}
      </div>
      <div class="navbar-custom__user-info">
        <span class="navbar-custom__user-name">{{ auth.getUsuario().nome }}</span>
        <span class="navbar-custom__user-role">{{ auth.getUsuario().perfil || 'Usuário' }}</span>
      </div>
    </div>

    <button 
      type="button"
      class="navbar-custom__btn-logout" 
      (click)="logout()">
      <span>Sair</span>
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
      </svg>
    </button>
    
  </div>
</nav>
