<aside class="sidebar" [class.collapsed]="layout.sidebarCollapsed$ | async" [class.mobile-open]="layout.mobileSidebarOpen$ | async">
  
  <button type="button" class="sidebar__toggle" (click)="layout.toggleSidebar()" aria-label="Menu">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
      <path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"/>
    </svg>
  </button>

  <div class="sidebar__brand">
    <img src="/logo-icon.png" alt="Zap Engenharia" class="sidebar__brand-logo">
  </div>

  <nav class="sidebar__nav">
    <ul class="sidebar__list">
      
      <li class="sidebar__item">
        <a routerLink="/dashboard" routerLinkActive="active" title="Dashboard" class="sidebar__link" (click)="layout.setMobileSidebarOpen(false)">
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          <span class="sidebar__text">Dashboard</span>
        </a>
      </li>

      <li class="sidebar__item">
        <a routerLink="/obras" routerLinkActive="active" title="Obras" class="sidebar__link" (click)="layout.setMobileSidebarOpen(false)">
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <span class="sidebar__text">Obras</span>
        </a>
      </li>

      <li class="sidebar__item">
        <a routerLink="/cadastro-obra" routerLinkActive="active" title="Nova Obra" class="sidebar__link" (click)="layout.setMobileSidebarOpen(false)">
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <line x1="12" y1="13" x2="12" y2="19"/>
            <line x1="9" y1="16" x2="15" y2="16"/>
          </svg>
          <span class="sidebar__text">Nova Obra</span>
        </a>
      </li>

      <li class="sidebar__item">
        <a routerLink="/funcionarios" routerLinkActive="active" title="Funcionários" class="sidebar__link" (click)="layout.setMobileSidebarOpen(false)">
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <span class="sidebar__text">Funcionários</span>
        </a>
      </li>

      <li class="sidebar__item">
        <a routerLink="/fornecedores" routerLinkActive="active" title="Fornecedores" class="sidebar__link" (click)="layout.setMobileSidebarOpen(false)">
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 16l3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1z"/>
            <path d="M2 16l3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1z"/>
            <path d="M7 21h10"/>
            <path d="M12 3v18"/>
            <path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/>
          </svg>
          <span class="sidebar__text">Fornecedores</span>
        </a>
      </li>

      <li class="sidebar__item">
        <a routerLink="/materiais" routerLinkActive="active" title="Materiais" class="sidebar__link" (click)="layout.setMobileSidebarOpen(false)">
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/>
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
            <line x1="12" y1="22.08" x2="12" y2="12"/>
          </svg>
          <span class="sidebar__text">Materiais</span>
        </a>
      </li>

      <li class="sidebar__item">
        <a routerLink="/equipamentos" routerLinkActive="active" title="Equipamentos" class="sidebar__link" (click)="layout.setMobileSidebarOpen(false)">
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            <circle cx="12" cy="16" r="1"/>
          </svg>
          <span class="sidebar__text">Equipamentos</span>
        </a>
      </li>

      <li class="sidebar__item">
        <a routerLink="/custos" routerLinkActive="active" title="Custos" class="sidebar__link" (click)="layout.setMobileSidebarOpen(false)">
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="2" x2="12" y2="22"/>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
          <span class="sidebar__text">Custos</span>
        </a>
      </li>

      <li class="sidebar__item">
        <a routerLink="/usuarios" routerLinkActive="active" title="Usuários" class="sidebar__link" (click)="layout.setMobileSidebarOpen(false)">
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="8.5" cy="7" r="4"/>
            <polyline points="17 11 19 13 23 9"/>
          </svg>
          <span class="sidebar__text">Usuários</span>
        </a>
      </li>

      <li *ngIf="isAdmin()" class="sidebar__item">
        <a routerLink="/cadastro-usuario" routerLinkActive="active" title="Novo Usuário" class="sidebar__link sidebar__link--sub" (click)="layout.setMobileSidebarOpen(false)">
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="8.5" cy="7" r="4"/>
            <line x1="20" y1="8" x2="20" y2="14"/>
            <line x1="23" y1="11" x2="17" y2="11"/>
          </svg>
          <span class="sidebar__text">Novo Usuário</span>
        </a>
      </li>

      <li class="sidebar__item">
        <a routerLink="/modelo3d" routerLinkActive="active" title="Modelo 3D" class="sidebar__link" (click)="layout.setMobileSidebarOpen(false)">
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          <span class="sidebar__text">Modelo 3D</span>
        </a>
      </li>

      <li class="sidebar__separator-item">
        <div class="sidebar__separator"></div>
      </li>

      <li class="sidebar__item">
        <a routerLink="/diario-obra" routerLinkActive="active" title="Diário de Obra" class="sidebar__link" (click)="layout.setMobileSidebarOpen(false)">
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
          <span class="sidebar__text">Diário de Obra</span>
        </a>
      </li>

      <li class="sidebar__item">
        <a routerLink="/relatorios" routerLinkActive="active" title="Relatórios" class="sidebar__link" (click)="layout.setMobileSidebarOpen(false)">
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <line x1="10" y1="9" x2="8" y2="9"/>
          </svg>
          <span class="sidebar__text">Relatórios</span>
        </a>
      </li>

      <li class="sidebar__item">
        <a routerLink="/alertas" routerLinkActive="active" title="Alertas" class="sidebar__link sidebar__link--alertas" (click)="layout.setMobileSidebarOpen(false)">
          <span class="sidebar__icon-wrap">
            <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            <span *ngIf="totalAlertas > 0" class="sidebar__badge" [class.sidebar__badge--danger]="temCritico">
              {{ totalAlertas > 9 ? '9+' : totalAlertas }}
            </span>
          </span>
          <span class="sidebar__text">Alertas</span>
        </a>
      </li>

    </ul>
  </nav>
</aside>
